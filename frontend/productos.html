<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos — SoundStore</title>
    <link rel="icon" href="/public/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/productos.css">
</head>
<body>
    <div id="header-container"></div>

    <main class="productos-main">
        <section class="productos-hero">
            <p class="productos-hero-eyebrow">Autoservicio musical</p>
            <h1 class="productos-hero-titulo">Elegí tu sonido.<br>Llevátelo hoy.</h1>
            <p class="productos-hero-texto">Guitarras y bajos seleccionados, listos para tocar. Sin vendedores, sin vueltas — directo al instrumento que buscás.</p>
        </section>
        <div class="categorias-tabs">
            <button class="tab-btn activo" data-categoria="Guitarras"> Guitarras</button>
            <button class="tab-btn" data-categoria="Bajos"> Bajos</button>
        </div>
        <p id="productos-estado" class="productos-estado oculto"></p>
        <section id="grilla-productos" class="grilla-productos"></section>
        <div id="paginacion" class="paginacion"></div>
    </main>

    <div id="footer-container"></div>
    <script src="/public/js/config.js"></script>
    <script src="/public/js/main.js"></script>
    <script src="/public/js/productos.js"></script>
</body>
</html>
